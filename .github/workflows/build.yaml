name : Let's build from here

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Clone ImmortalWrt 24.10.5 X86_64 SDK & init
        uses: mokanove/mokanove/actions/prepare-x86_64-ipk-sdk@main

      - name: Clone ImmortalWrt 25.12-SNAPSHOT X86_64 SDK & init
        uses: mokanove/mokanove/actions/prepare-x86_64-apk-sdk@main

      - name: Clone ImmortalWrt 25.12-SNAPSHOT RockChip SDK & init
        uses: mokanove/mokanove/actions/prepare-rockchip-apk-sdk@main

      - name: Clone Project source code
        shell: bash
        run: |
          cd immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64/package/
          git clone https://github.com/mokanove/rdks.git
          cd ../../
          cd immortalwrt-sdk-25.12-SNAPSHOT-x86-64_gcc-14.3.0_musl.Linux-x86_64/package/
          git clone https://github.com/mokanove/rdks.git
          cd ../../
          cd immortalwrt-sdk-25.12-SNAPSHOT-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64/package/
          git clone https://github.com/mokanove/rdks.git
          cd ../../

      - name: Get Version
        id: get_version
        shell: bash
        run: |
            cd immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64/package/rdks
            VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build X86_64 ipk
        shell: bash
        run: |
            cd immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64/package/rdks/root/etc/rustdesk
            rm DONOTREMOVE
            curl -LO https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-amd64.zip
            unzip rustdesk-server-linux-amd64.zip
            rm rustdesk-server-linux-amd64.zip
            mv amd64/* ./
            rm -rf amd64/
            cd ../../../../../
            make package/rdks/compile V=s -j$(nproc)

      - name: Build X86_64 apk
        shell: bash
        run: |
            cd immortalwrt-sdk-25.12-SNAPSHOT-x86-64_gcc-14.3.0_musl.Linux-x86_64/package/rdks/root/etc/rustdesk
            rm DONOTREMOVE
            curl -LO https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-amd64.zip
            unzip rustdesk-server-linux-amd64.zip
            rm rustdesk-server-linux-amd64.zip
            mv amd64/* ./
            rm -rf amd64/
            cd ../../../../../
            make package/rdks/compile V=s -j$(nproc)

      - name: Build aarch64_rockchip apk
        shell: bash
        run: |
            cd immortalwrt-sdk-25.12-SNAPSHOT-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64/package/rdks/root/etc/rustdesk
            rm DONOTREMOVE
            curl -LO https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-arm64v8.zip
            unzip rustdesk-server-linux-arm64v8.zip
            rm rustdesk-server-linux-arm64v8.zip
            mv arm64v8/* ./
            rm -rf arm64v8/
            cd ../../../
            sed -i 's/x86_64/aarch64_generic/g' Makefile
            cd ../../
            make package/rdks/compile V=s -j$(nproc)

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64/bin/packages/*/base/*.ipk
            immortalwrt-sdk-25.12-SNAPSHOT-x86-64_gcc-14.3.0_musl.Linux-x86_64/bin/packages/*/base/*.apk
            immortalwrt-sdk-25.12-SNAPSHOT-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64/bin/packages/*/base/*.apk
          body: |
            # This release by GitHub Actions
            > I don't know if it will run, but as long as it was compiled, that's fine.
            ## Please note:
            > APK files do not specify the architecture in their filenames.
            >
            > Therefore, please refer to the timestamps; the later timestamps are for aarch64_rockchip devices, and the earlier timestamps are for x86_64 devices.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
