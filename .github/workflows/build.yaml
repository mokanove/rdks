name :

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build (${{ matrix.version }}-${{ matrix.rustdesk_arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "25.12.0-rc1"
            target: "x86"
            subtarget: "64"
            rustdesk_arch: "amd64"
            sdk_name: "immortalwrt-sdk-25.12.0-rc1-x86-64_gcc-14.3.0_musl.Linux-x86_64"
            ext: "apk"
            needs_patch: false
          - version: "25.12.0-rc1"
            target: "rockchip"
            subtarget: "armv8"
            rustdesk_arch: "arm64v8"
            sdk_name: "immortalwrt-sdk-25.12.0-rc1-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"
            ext: "apk"
            needs_patch: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          version: ${{ matrix.version }}
          target: ${{ matrix.target }}
          subtarget: ${{ matrix.subtarget }}
          sdk_name: ${{ matrix.sdk_name }}

      - name: Clone Project source code & Get Version & Change Arch
        id: get_version
        run: |
          cd ${{ matrix.sdk_name }}/package/
          git clone https://github.com/mokanove/rdks.git

          cd rdks
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          sed -i 's/PKGRELEASET/${{ matrix.target }}_${{ matrix.subtarget }}/g' ./Makefile

          if [ "${{ matrix.needs_patch }}" == "true" ]; then
            sed -i 's/x86_64/aarch64_generic/g' ./Makefile
          fi

      - name: Build!
        shell: bash
        run: |
            cd ${{ matrix.sdk_name }}/package/rdks/root/etc/rustdesk
            rm DONOTREMOVE
            curl -LO "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip"
            unzip rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip
            rm rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip
            mv ${{ matrix.rustdesk_arch }}/* ./
            rm -rf ${{ matrix.rustdesk_arch }}/
            cd ../../../../../
            make package/rdks/compile V=s -j$(nproc)

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            ${{ matrix.sdk_name }}/bin/packages/*/*/*
          body: |
            # 🚀 Release Notes
            ### ✨ Change Logs
            - **Filename update**: The architecture can now be directly seen in the filename.
            - **Makefile update**: The Makefile was modified to conform to the official ImmortalWrt standard.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
