name : amigos y amigas de medellin

on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    name: Build (${{ matrix.version }}-${{ matrix.rustdesk_arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "25.12.0-rc1"
            target: "x86"
            subtarget: "64"
            rustdesk_arch: "amd64"
            patch_arch: "X86_64"
            sdk_name: "immortalwrt-sdk-25.12.0-rc1-x86-64_gcc-14.3.0_musl.Linux-x86_64"
          - version: "25.12.0-rc1"
            target: "rockchip"
            subtarget: "armv8"
            rustdesk_arch: "arm64v8"
            patch_arch: "aarch64_generic"
            sdk_name: "immortalwrt-sdk-25.12.0-rc1-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@main

      - name: Install Build Dependencies
        uses: mokanove/mokanove/actions/luci-env@main

      - name: Prepare SDK
        uses: mokanove/mokanove/actions/prepare-sdk@main
        with:
          sdk_name: ${{ matrix.sdk_name }}

      - name: Clone Project source code & Get Version & Change Arch
        id: get_version
        run: |
          cd ${{ matrix.sdk_name }}/package/
          git clone https://github.com/mokanove/rdks.git

          cd rdks
          VERSION=$(grep -E "^PKG_VERSION[[:space:]]*:=" Makefile | sed -E 's/.*:=[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "${{ matrix.patch_arch }}" != "true" ]; then
            sed -i 's/x86_64/${{ matrix.patch_arch }}/g' ./Makefile
          fi

      - name: Build!
        shell: bash
        run: |
            cd ${{ matrix.sdk_name }}/package/rdks/root/etc/rustdesk
            rm DONOTREMOVE
            curl -LO "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip"
            unzip rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip
            rm rustdesk-server-linux-${{ matrix.rustdesk_arch }}.zip
            mv ${{ matrix.rustdesk_arch }}/* ./
            rm -rf ${{ matrix.rustdesk_arch }}/
            cd ../../../
            make compile/ V=s -j$(nproc)
            cd bin/packages/${{ matrix.target }}/${{ matrix.subtarget }}/base/
            mv rdks* rdks-${{ steps.get_version.outputs.version }}-${{ matrix.rustdesk_arch }}.apk

      - name: Release
        uses: softprops/action-gh-release@master
        with:
          tag_name: V${{ steps.get_version.outputs.version }}
          files: |
            ${{ matrix.sdk_name }}/bin/packages/**/*.apk
          body: |
            # 🚀 Release Notes
            ### ✨ Change Logs
            - **External Updates**: The content of the action and Makefile has been optimized.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
